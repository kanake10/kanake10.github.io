{{- define "main" -}}
<div class="wrapper list-page">
    <header class="header">
        <h1 class="header-title center">{{ .Site.Title }}</h1>
    </header>
    <main class="page-content" aria-label="Content">
        {{ range (where .Site.RegularPages "Type" "posts").GroupByDate "2006" }}
        {{ $year := .Key }}
        <h2 class="post-year">{{ $year }}</h2>

        {{ range .Pages }}
        {{ partial "postCard" . }}
        {{ end }}

        {{ end }}
    </main>
</div>
{{- end -}}
